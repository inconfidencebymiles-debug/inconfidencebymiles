<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Menu — In Confidence by Miles</title>
<meta name="description" content="Menu de In Confidence Speakeasy — Cócteles de autor y tapas para compartir. Barcelona.">
<link href="https://api.fontshare.com/v2/css?f[]=zodiak@400,500,600,700&f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
<style>
  :root {
    --color-bg: #0C0A08;
    --color-gold: #D4A85A;
    --color-cream: #E8E0D0;
    --color-text-muted: #9E9688;
    --color-border: rgba(212, 168, 90, 0.15);
    --font-display: 'Zodiak', 'Georgia', serif;
    --font-body: 'General Sans', 'Helvetica Neue', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--color-bg);
    color: var(--color-cream);
    font-family: var(--font-body);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .menu-hub {
    max-width: 420px;
    width: 100%;
    margin: 0 auto;
    padding: 3rem 1.5rem;
    text-align: center;
  }
  .menu-hub__logo {
    width: 180px;
    height: auto;
    margin: 0 auto 1.5rem;
    display: block;
  }
  .menu-hub__tagline {
    font-family: var(--font-body);
    font-size: 0.85rem;
    color: var(--color-text-muted);
    font-style: italic;
    margin-bottom: 0.5rem;
  }
  .menu-hub__visit {
    display: inline-block;
    font-size: 0.85rem;
    color: var(--color-cream);
    text-decoration: underline;
    margin-bottom: 2.5rem;
  }
  .menu-hub__links {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .menu-hub__link {
    display: block;
    padding: 1rem 1.5rem;
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    color: var(--color-cream);
    text-decoration: none;
    font-family: var(--font-body);
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.3s ease;
  }
  .menu-hub__link:hover {
    background: rgba(212, 168, 90, 0.15);
    color: var(--color-gold);
  }
  .menu-hub__footer {
    margin-top: 3rem;
    font-size: 0.75rem;
    color: var(--color-text-muted);
  }
  body { -webkit-user-select: none; -moz-user-select: none; user-select: none; }
  img { -webkit-user-drag: none; pointer-events: none; }
</style>
</head>
<body>
<div class="menu-hub">
  <img src="./assets/photos/logo-devanture-transparent.png" alt="Miles Gastro Cocktails Lounge" class="menu-hub__logo">
  <p class="menu-hub__tagline">Todo lo que necesitas, a un toque.</p>
  <a href="./inconfidence" class="menu-hub__visit">Visitar el sitio web →</a>
  <div class="menu-hub__links">
    <a href="./carta" class="menu-hub__link">Menú — Zona Speakeasy</a>
    <a href="./carta-tapas" class="menu-hub__link">Tapas & Platos</a>
    <a href="https://g.page/r/CQQz9jHMwS0iEB0/review" class="menu-hub__link">Dejar una reseña en Google ⭐</a>
  </div>
  <div class="menu-hub__footer">© 2026 Miles Cocktail Lounge</div>
</div>
<script>
document.addEventListener("contextmenu",function(e){e.preventDefault()});
document.addEventListener("selectstart",function(e){e.preventDefault()});
document.addEventListener("dragstart",function(e){e.preventDefault()});
document.addEventListener("keydown",function(e){
  if((e.ctrlKey||e.metaKey)&&(e.key==="c"||e.key==="u"||e.key==="s"||e.key==="a"||e.key==="p")){e.preventDefault()}
});
</script>
</body>
</html>
