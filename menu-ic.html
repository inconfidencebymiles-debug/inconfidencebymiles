<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Menu — In Confidence by Miles</title>
<meta name="description" content="Menu de In Confidence Speakeasy — Cócteles de autor y tapas para compartir. Barcelona.">
<link href="https://api.fontshare.com/v2/css?f[]=zodiak@400,500,600,700&f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
<style>
  :root {
    --color-bg: #0C0A08;
    --color-gold: #D4A85A;
    --color-gold-light: #E7BE78;
    --color-cream: #E8E0D0;
    --color-text-muted: #9E9688;
    --color-border: rgba(212, 168, 90, 0.15);
    --font-display: 'Zodiak', 'Georgia', serif;
    --font-body: 'General Sans', 'Helvetica Neue', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--color-bg);
    color: var(--color-cream);
    font-family: var(--font-body);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .menu-hub {
    max-width: 420px;
    width: 100%;
    margin: 0 auto;
    padding: 3rem 1.5rem;
    text-align: center;
  }

  .menu-hub__logo {
    width: 180px;
    height: auto;
    margin: 0 auto 1rem;
    display: block;
  }

  .menu-hub__title {
    font-family: var(--font-display);
    font-size: 1.6rem;
    font-weight: 500;
    color: var(--color-cream);
    margin-bottom: 0.3rem;
  }

  .menu-hub__subtitle {
    font-family: var(--font-body);
    font-size: 0.85rem;
    color: var(--color-text-muted);
    font-style: italic;
    margin-bottom: 2.5rem;
  }

  .menu-hub__links {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .menu-hub__link {
    display: block;
    padding: 1rem 1.5rem;
    border: 1px solid var(--color-border);
    border-radius: 6px;
    color: var(--color-cream);
    text-decoration: none;
    font-family: var(--font-body);
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    transition: all 0.3s ease;
  }

  .menu-hub__link:hover {
    background: rgba(212, 168, 90, 0.1);
    border-color: var(--color-gold);
    color: var(--color-gold);
  }

  .menu-hub__link-label {
    display: block;
    font-size: 0.7rem;
    color: var(--color-text-muted);
    margin-top: 0.3rem;
    letter-spacing: 0.05em;
  }

  .menu-hub__footer {
    margin-top: 3rem;
    font-size: 0.75rem;
    color: var(--color-text-muted);
  }

  .menu-hub__footer a {
    color: var(--color-gold);
    text-decoration: none;
  }

  /* Anti-copy */
  body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
  img { -webkit-user-drag: none; pointer-events: none; }
</style>
</head>
<body>

<div class="menu-hub">
  <img src="./assets/photos/logo-devanture-transparent.png" alt="Miles Gastro Cocktails Lounge" class="menu-hub__logo">
  <h1 class="menu-hub__title">In Confidence</h1>
  <p class="menu-hub__subtitle">Secret Speakeasy — Barcelona</p>

  <div class="menu-hub__links">
    <a href="./carta" class="menu-hub__link">
      Signature Cocktails
      <span class="menu-hub__link-label">Cócteles de autor · 12 €</span>
    </a>
    <a href="./carta-tapas" class="menu-hub__link">
      Tapas para compartir
      <span class="menu-hub__link-label">Nuestra carta gastronómica</span>
    </a>
  </div>

  <div class="menu-hub__footer">
    <a href="./inconfidence">inconfidencebymiles.com</a>
  </div>
</div>

<script>
document.addEventListener("contextmenu",function(e){e.preventDefault()});
document.addEventListener("selectstart",function(e){e.preventDefault()});
document.addEventListener("dragstart",function(e){e.preventDefault()});
document.addEventListener("keydown",function(e){
  if((e.ctrlKey||e.metaKey)&&(e.key==="c"||e.key==="u"||e.key==="s"||e.key==="a"||e.key==="p")){e.preventDefault()}
});
</script>
</body>
</html>
