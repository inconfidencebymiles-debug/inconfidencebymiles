<style>
  :root {
    --color-bg: #0C0A08;
    --color-gold: #D4A85A;
    --color-gold-light: #E7BE78;
    --color-gold-dim: #9E7B3A;
    --color-cream: #E8E0D0;
    --color-text-muted: #9E9688;
    --color-text-faint: #6A6358;
    --color-border: rgba(212, 168, 90, 0.15);
    --font-display: 'Zodiak', 'Georgia', serif;
    --font-body: 'General Sans', 'Helvetica Neue', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--color-bg);
    color: var(--color-cream);
    font-family: var(--font-body);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .hub {
    max-width: 540px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
  }

  .hub__header {
    text-align: center;
    padding: 2rem 0 2.5rem;
  }

  .hub__intro {
    font-family: var(--font-body);
    font-size: 0.85rem;
    color: var(--color-text-muted);
    font-style: italic;
    margin-top: 1.5rem;
  }

  .hub__links {
    margin-top: 2rem;
  }

  .hub__link {
    display: block;
    width: 100%;
    text-align: center;
    background: transparent;
    border: none;
    padding: 1rem 1.5rem;
    font-family: var(--font-body);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--color-gold);
    margin-bottom: 0.75rem;
    text-decoration: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .hub__link:hover {
    color: var(--color-gold-light);
  }

  .hub__footer {
    text-align: center;
    margin-top: 3rem;
  }

  .hub__diamond {
    display: block;
    text-align: center;
    color: var(--color-gold-dim);
    font-size: 0.5rem;
    margin-bottom: 0.75rem;
  }

  .hub__copy {
    font-size: 0.7rem;
    color: var(--color-text-faint);
    font-style: italic;
  }
